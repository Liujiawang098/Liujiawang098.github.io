<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="baidu-site-verification" content="codeva-NZ7P0Fsakr" />
    <title>Hi, I'm 飞鸟折白梅 ✨</title>
    <link rel="icon" type="image/png" href="img/tx.jpg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 白色主题配色变量 */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: #f1f3f4;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #6a6a6a;
            --accent-1: #2563eb;
            --accent-2: #3b82f6;
            --accent-3: #1d4ed8;
            --accent-4: #1e40af;
            --border-light: #e5e7eb;
            --border-medium: #d1d5db;
            --shadow-light: rgba(0, 0, 0, 0.05);
            --shadow-medium: rgba(0, 0, 0, 0.1);
            --shadow-strong: rgba(0, 0, 0, 0.15);
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* 自定义光标 */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-1);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
        }

        .cursor-follower {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--accent-1);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease;
        }

        /* 导航点 */
        .nav-dots {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border-medium);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            background: var(--accent-1);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .dot.active::after,
        .dot:hover::after {
            width: 8px;
            height: 8px;
        }

        /* 通用样式 */
        .section-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 50px;
            min-height: 100vh;
        }

        .section-label {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .label-text {
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .label-line {
            width: 50px;
            height: 1px;
            background: var(--border-medium);
            margin-top: 10px;
        }

        /* 主页部分 */
        .hero {
            background: var(--bg-primary);
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.3;
            pointer-events: none;
            overflow: hidden;
        }

        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--border-light) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-light) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: grid-move 25s linear infinite;
            opacity: 0.6;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* 几何形状变换效果 */
        .geometric-shapes {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            transform: translate(-50%, -50%);
            animation: rotate-slow 30s linear infinite;
        }

        .geo-shape {
            position: absolute;
            border: 1px solid rgba(37, 99, 235, 0.2);
            animation: shape-morph 8s ease-in-out infinite;
        }

        .geo-shape:nth-child(1) {
            top: 25%;
            left: 25%;
            width: 100px;
            height: 100px;
            border-radius: 20px;
            animation-delay: 0s;
        }

        .geo-shape:nth-child(2) {
            top: 25%;
            right: 25%;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            animation-delay: 2s;
        }

        .geo-shape:nth-child(3) {
            bottom: 25%;
            left: 25%;
            width: 60px;
            height: 60px;
            transform: rotate(45deg);
            animation-delay: 4s;
        }

        .geo-shape:nth-child(4) {
            bottom: 25%;
            right: 25%;
            width: 90px;
            height: 90px;
            border-radius: 30px;
            animation-delay: 6s;
        }

        @keyframes rotate-slow {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes shape-morph {
            0%, 100% {
                transform: scale(1) rotate(0deg);
                opacity: 0.3;
                border-color: rgba(37, 99, 235, 0.2);
            }
            25% {
                transform: scale(1.2) rotate(90deg);
                opacity: 0.6;
                border-color: rgba(59, 130, 246, 0.3);
            }
            50% {
                transform: scale(0.8) rotate(180deg);
                opacity: 0.8;
                border-color: rgba(29, 78, 216, 0.4);
            }
            75% {
                transform: scale(1.1) rotate(270deg);
                opacity: 0.5;
                border-color: rgba(37, 99, 235, 0.25);
            }
        }

        /* 流动线条 */
        .flowing-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-1), transparent);
            animation: flow 12s linear infinite;
            opacity: 0.7;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.3);
        }

        .line:nth-child(1) {
            top: 20%;
            width: 200px;
            animation-delay: 0s;
        }

        .line:nth-child(2) {
            top: 40%;
            width: 300px;
            animation-delay: 3s;
        }

        .line:nth-child(3) {
            top: 60%;
            width: 150px;
            animation-delay: 6s;
        }

        .line:nth-child(4) {
            top: 80%;
            width: 250px;
            animation-delay: 9s;
        }

        @keyframes flow {
            0% {
                left: -300px;
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                left: 100%;
                opacity: 0;
            }
        }

        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><filter id="noise"><feTurbulence baseFrequency="0.9"/></filter></defs><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.02"/></svg>');
            animation: noise-float 8s ease-in-out infinite;
        }

        @keyframes noise-float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* 浮动几何元素 */
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 8s ease-in-out infinite;
        }

        .shape-1 {
            top: 10%;
            left: 10%;
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, var(--accent-1), transparent);
            border-radius: 50%;
            animation-delay: 0s;
        }

        .shape-2 {
            top: 70%;
            right: 15%;
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, var(--accent-2), transparent);
            transform: rotate(45deg);
            animation-delay: 2s;
        }

        .shape-3 {
            top: 30%;
            right: 5%;
            width: 30px;
            height: 30px;
            border: 2px solid var(--accent-1);
            border-radius: 50%;
            animation-delay: 4s;
        }

        .shape-4 {
            bottom: 20%;
            left: 5%;
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, transparent, var(--accent-1), transparent);
            border-radius: 20%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0px) rotate(0deg);
                opacity: 0.1;
            }
            25% { 
                transform: translateY(-20px) rotate(90deg);
                opacity: 0.2;
            }
            50% { 
                transform: translateY(-40px) rotate(180deg);
                opacity: 0.15;
            }
            75% { 
                transform: translateY(-20px) rotate(270deg);
                opacity: 0.25;
            }
        }

        /* 光线效果 */
        .light-rays {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                rgba(37, 99, 235, 0.05) 0%,
                transparent 50%
            );
            animation: pulse-light 4s ease-in-out infinite;
        }

        @keyframes pulse-light {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        /* 星空效果 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-1);
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
            box-shadow: 0 0 15px var(--accent-1);
        }

        .star:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .star:nth-child(2) { top: 20%; left: 80%; animation-delay: 0.5s; }
        .star:nth-child(3) { top: 60%; left: 10%; animation-delay: 1s; }
        .star:nth-child(4) { top: 80%; left: 70%; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 30%; left: 60%; animation-delay: 2s; }
        .star:nth-child(6) { top: 70%; left: 30%; animation-delay: 2.5s; }

        @keyframes twinkle {
            0%, 100% { 
                opacity: 0.6; 
                transform: scale(1);
            }
            50% { 
                opacity: 1; 
                transform: scale(2);
                box-shadow: 0 0 25px var(--accent-1);
            }
        }

        /* 光晕效果 */
        .glow-orbs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            animation: float-glow 10s ease-in-out infinite;
        }

        .orb-1 {
            top: 10%;
            left: 10%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.2) 0%, transparent 70%);
            animation-delay: 0s;
        }

        .orb-2 {
            top: 60%;
            right: 10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            animation-delay: 3s;
        }

        .orb-3 {
            bottom: 20%;
            left: 30%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(29, 78, 216, 0.12) 0%, transparent 70%);
            animation-delay: 6s;
        }

        @keyframes float-glow {
            0%, 100% { 
                transform: translate(0, 0) scale(1);
                opacity: 0.8;
            }
            33% { 
                transform: translate(30px, -20px) scale(1.1);
                opacity: 1;
            }
            66% { 
                transform: translate(-20px, 30px) scale(0.9);
                opacity: 0.6;
            }
        }

        /* 粒子效果 */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-1);
            border-radius: 50%;
            animation: particle-float 6s linear infinite;
        }

        .particle:nth-child(1) { left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 40%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 60%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 80%; animation-delay: 3s; }

        @keyframes particle-float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
            min-height: 100vh;
        }

        .hero-text {
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 0;
        }

        /* 头像和基本信息区域样式 */
        .hero-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            margin-bottom: 60px;
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
            position: relative;
        }

        .hero-avatar {
            flex-shrink: 0;
            position: relative;
        }

        .hero-avatar .avatar-frame {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--bg-tertiary);
            box-shadow: 0 12px 40px var(--shadow-medium);
            background: var(--bg-secondary);
            animation: float 6s ease-in-out infinite;
        }

        .hero-avatar .avatar-frame::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            z-index: -1;
            opacity: 0.15;
            animation: rotate 20s linear infinite;
        }

        .hero-avatar .avatar {
            position: absolute;
            top: 8px;
            left: 8px;
            width: calc(100% - 16px);
            height: calc(100% - 16px);
            border-radius: 50%;
            overflow: hidden;
        }

        .hero-avatar .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .hero-avatar:hover .avatar-img {
            transform: scale(1.05);
        }

        .hero-avatar .status-dot {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 20px;
            height: 20px;
            background: #22c55e;
            border-radius: 50%;
            border: 4px solid #ffffff;
            animation: pulse 2s infinite;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
        }

        .hero-info {
            text-align: center;
        }

        .avatar-name {
            font-family: var(--font-sans);
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-1));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-info .hero-description {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 24px;
            font-weight: 400;
        }

        .role-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .role-tag {
            font-size: 12px;
            color: var(--accent-1);
            background: rgba(37, 99, 235, 0.1);
            padding: 4px 12px;
            border-radius: 16px;
            border: 1px solid rgba(37, 99, 235, 0.2);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .role-tag:hover {
            background: rgba(37, 99, 235, 0.15);
            border-color: var(--accent-1);
        }





        /* 状态指示器 */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
            padding: 6px 12px;
            background: rgba(37, 99, 235, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(37, 99, 235, 0.1);
            width: fit-content;
        }

        .status-dot-live {
            width: 8px;
            height: 8px;
            background: var(--accent-1);
            border-radius: 50%;
            animation: pulse-live 2s infinite;
            box-shadow: 0 0 10px var(--accent-1);
        }

        @keyframes pulse-live {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        .status-text {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 问候语 */
        .hero-greeting {
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.2s;
            opacity: 0;
        }

        .greeting-text {
            font-size: 18px;
            color: var(--accent-1);
            font-weight: 500;
            display: block;
            margin-bottom: 10px;
        }

        .greeting-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-1), transparent);
        }

        /* 主标题区域 */
        .hero-title-section {
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.4s;
            opacity: 0;
        }

        .hero-main-title {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .name-highlight {
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        .name-highlight::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
            opacity: 0.3;
        }

        .title-subtitle {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .role-text {
            color: var(--text-secondary);
            padding: 10px 20px;
            border: 2px solid var(--accent-1);
            border-radius: 30px;
            background: rgba(37, 99, 235, 0.05);
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 描述文本 */
        .hero-description {
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.6s;
            opacity: 0;
        }

        .description-text {
            font-size: 24px;
            line-height: 1.6;
            color: var(--text-primary);
            max-width: 600px;
            font-weight: 300;
            text-align: center;
            margin: 0 auto;
        }

        .highlight-word {
            color: var(--accent-1);
            font-weight: 600;
            position: relative;
        }

        .highlight-word::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-1);
            opacity: 0.3;
        }

        /* 统计数据 */
        .hero-stats {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.8s;
            opacity: 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            font-family: var(--font-mono);
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            line-height: 1;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-family: var(--font-mono);
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .stat-divider {
            width: 2px;
            height: 50px;
            background: linear-gradient(to bottom, transparent, var(--border-medium), transparent);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-actions {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 1.0s;
            opacity: 0;
        }

        .cta-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            border-radius: 12px;
            font-family: var(--font-sans);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            border: none;
        }

        .cta-btn.primary {
            background: var(--accent-1);
            color: white;
            box-shadow: 0 6px 20px var(--shadow-medium);
        }

        .cta-btn.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px var(--shadow-strong);
            background: var(--accent-3);
        }

        .cta-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 2px solid var(--border-medium);
        }

        .cta-btn.secondary:hover {
            border-color: var(--accent-1);
            color: var(--accent-1);
            box-shadow: 0 6px 20px var(--shadow-light);
            background: rgba(37, 99, 235, 0.05);
        }

        .btn-text {
            position: relative;
            z-index: 2;
        }

        .btn-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .cta-btn:hover .btn-icon {
            transform: translateX(3px);
        }

        /* 社交连接区域 */
        .social-connect {
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 1.2s;
            opacity: 0;
        }

        .social-label {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 1px solid var(--border-medium);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--bg-tertiary), transparent);
            transition: left 0.5s ease;
        }

        .social-link:hover::before {
            left: 100%;
        }

        .social-link:hover {
            color: var(--accent-1);
            border-color: var(--accent-1);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow-light);
            background: rgba(37, 99, 235, 0.05);
        }

        .social-text {
            font-family: var(--font-mono);
            font-size: 12px;
        }

        /* 终端样式 */
        .terminal {
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 1px solid var(--border-medium);
            box-shadow: 0 10px 30px var(--shadow-medium);
            overflow: hidden;
        }

        .terminal-header {
            background: var(--bg-secondary);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-medium);
        }

        .terminal-controls {
            display: flex;
            gap: 8px;
        }

        .control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .control.red { background: #ff5f56; }
        .control.yellow { background: #ffbd2e; }
        .control.green { background: #27ca3f; }

        .terminal-title {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-secondary);
        }

        .terminal-body {
            padding: 32px;
            font-family: var(--font-mono);
            font-size: 15px;
            line-height: 1.7;
            height: calc(100% - 64px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .prompt {
            color: var(--accent-1);
        }

        .command {
            color: var(--text-primary);
        }

        .cursor-blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .output {
            color: var(--text-secondary);
            margin-left: 20px;
        }

        /* 终端容器 */
        .terminals-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 0;
        }

        /* 三个终端网格布局 */
        .terminals-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            max-width: 520px;
        }

        .terminal-item {
            background: var(--bg-tertiary);
            border-radius: 20px;
            border: 1px solid var(--border-medium);
            box-shadow: 0 8px 32px var(--shadow-medium);
            overflow: hidden;
            font-family: var(--font-mono);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 220px;
        }

        .terminal-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px var(--shadow-strong);
            border-color: var(--accent-1);
        }

        .terminal-item:nth-child(1) { animation-delay: 0.1s; }
        .terminal-item:nth-child(2) { animation-delay: 0.2s; }
        .terminal-item:nth-child(3) { animation-delay: 0.3s; }

        .terminal-line {
            margin-bottom: 8px;
        }

        .service-output {
            margin-left: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .service-info {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .service-desc {
            color: var(--text-secondary);
            font-size: 11px;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .service-link {
            color: var(--accent-1);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .service-link:hover {
            color: var(--accent-2);
            transform: translateX(3px);
        }

        .qq-group-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .qq-number {
            font-size: 13px;
            color: var(--text-primary);
            background: var(--bg-secondary);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-light);
        }

        .join-btn {
            background: var(--accent-1);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .join-btn:hover {
            background: var(--accent-2);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .status-line {
            font-size: 12px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-line.success {
            color: #22c55e;
        }

        .status-line.info {
            color: var(--accent-1);
        }

        .status-line.warning {
            color: #f59e0b;
        }

        /* 广告区域样式 */
        .ads-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 0;
        }

        .ads-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .ads-header {
            text-align: center;
            margin-bottom: 10px;
        }

        .ads-title {
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ad-card {
            background: var(--bg-primary);
            border-radius: 16px;
            border: 1px solid var(--border-light);
            padding: 24px;
            box-shadow: 0 4px 20px var(--shadow-light);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .ad-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
        }

        .ad-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px var(--shadow-medium);
            border-color: var(--accent-1);
        }

        .ad-icon {
            font-size: 32px;
            margin-bottom: 15px;
            text-align: center;
        }

        .ad-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .ad-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .ad-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-1);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 8px 12px;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(37, 99, 235, 0.2);
            transition: all 0.3s ease;
        }

        .ad-link:hover {
            background: rgba(37, 99, 235, 0.2);
            transform: scale(1.02);
        }

        .link-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-icon {
            font-size: 14px;
        }

        .qq-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qq-number {
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            background: var(--bg-secondary);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
        }

        .qq-join-btn {
            background: var(--accent-1);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .qq-join-btn:hover {
            background: var(--accent-2);
            transform: scale(1.05);
        }

        /* 迷你终端样式 */
        .mini-terminal {
            background: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 20px var(--shadow-light);
            overflow: hidden;
        }

        .mini-terminal .terminal-header {
            padding: 12px 16px;
            background: var(--bg-secondary);
        }

        .mini-terminal .terminal-body {
            padding: 16px;
            font-size: 13px;
        }

        /* 其他部分样式 */
        .about {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .about-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-primary);
        }

        .highlight {
            background: linear-gradient(45deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .about-description {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .skills-quick {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .skills-title {
            margin-top: 24px;
            margin-bottom: 14px;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .skill-item {
            padding: 8px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-medium);
            border-radius: 20px;
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .skill-item:hover {
            border-color: var(--accent-1);
            color: var(--accent-1);
            transform: translateY(-2px);
        }

        .skill-icon {
            margin-right: 8px;
        }

        /* 信息卡片样式 */
        .info-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 300px;
        }

        .info-card {
            display: flex;
